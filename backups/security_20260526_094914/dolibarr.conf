<VirtualHost 0.0.0.0:87>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/dolibarr-23.0.2/htdocs

    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy 172.16.0.96

    <Directory /var/www/dolibarr-23.0.2/htdocs>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <Directory /var/www/dolibarr-23.0.2/htdocs/conf>
        Require all denied
    </Directory>

    <Directory /var/www/dolibarr-23.0.2/htdocs/data>
        Require all denied
    </Directory>

    <Directory /var/www/dolibarr-23.0.2/htdocs/api>
        Require ip 127.0.0.1 ::1 172.16.0.96
    </Directory>

    <FilesMatch "debug_.*\.php$">
        Require ip 127.0.0.1 ::1
        Require all denied
    </FilesMatch>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-dolibarr.sock|fcgi://localhost/"
    </FilesMatch>

    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
    ErrorLog ${APACHE_LOG_DIR}/dolibarr-error.log
    CustomLog ${APACHE_LOG_DIR}/dolibarr-access.log combined
</VirtualHost>
